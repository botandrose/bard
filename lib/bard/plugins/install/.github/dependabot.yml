version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    allow:
      - dependency-type: "all"
    rebase-strategy: "disabled"
    versioning-strategy: "lockfile-only"
    groups:
      semver_updates:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
